TRAIN:
  MANUAL_SEED: 1
  CONV_REPEATABLE: true
  BATCH_SIZE: 8
  EPOCH: 101

  OPTIMIZER: adam
  LR: 0.0001
  WEIGHT_DECAY: 0.0
  SCHEDULER: StepLR
  LR_DECAY_STEP: [70]
  LR_DECAY_GAMMA: 0.1

  LOG_INTERVAL: 25
  FIND_UNUSED_PARAMETERS: false
  DEBUG_LOGS: false
  STATIC_GRAPH: false

  # Start directly from stage2 while reusing the stage1 pure-SV checkpoint as initialization.
  STAGE1_END_EPOCH: 0
  STAGE2_WARMUP_EPOCHS: 0
  SV_SELF_DISTILL_ENABLED: false
  SV_SELF_DISTILL_START_EPOCH: 999999
  VAL_RECON_FULL_ONLY_FINAL: false

  GRAD_CLIP_ENABLED: true
  GRAD_CLIP:
    TYPE: 2
    NORM: 1.0

DATASET:
  TRAIN:
    TYPE: DexYCBMultiView
    DATA_MODE: 3D
    DATA_ROOT: /media/hl/nvme1TB/datasets
    DATA_SPLIT: train
    SETUP: s0
    N_VIEWS: 8
    USE_LEFT_HAND: false
    FILTER_INVISIBLE_HAND: true
    MAX_HAND_OBJ_SURFACE_DIST_MM: 5.0
    MASTER_SYSTEM: as_constant_camera
    TRANSFORM:
      TYPE: SimpleTransform3DMultiView
      AUG: true
      CENTER_JIT: 0.0
      SCALE_JIT: 0.02
      COLOR_JIT: 0.3
      ROT_JIT: 5
      ROT_PROB: 0.2
      OCCLUSION: true
      OCCLUSION_PROB: 0.1
      MIN_JOINTS_IN_RAW: 3
      MIN_JOINTS_AFTER_CROP: 3

  TEST:
    TYPE: DexYCBMultiView
    DATA_MODE: 3D
    DATA_ROOT: /media/hl/nvme1TB/datasets
    DATA_SPLIT: test
    SETUP: s0
    N_VIEWS: 8
    USE_LEFT_HAND: false
    FILTER_INVISIBLE_HAND: true
    MAX_HAND_OBJ_SURFACE_DIST_MM: 5.0
    TEST_WITH_MULTIVIEW: true
    MASTER_SYSTEM: as_constant_camera
    TRANSFORM:
      TYPE: SimpleTransform3DMultiView
      AUG: false

DATA_PRESET:
  MODE: mv
  USE_CACHE: true

  IMAGE_SIZE: [256, 256]
  CENTER_IDX: 9
  BBOX_3D_SIZE: 0.4
  NUM_JOINTS: 21
  NUM_VERTS: 778

  WITH_HEATMAP: false
  HEATMAP_SIZE: [32, 32]
  HEATMAP_SIGMA: 2.0
  WITH_MASK: false

  # Keep train/val crop domain consistent: stage1/stage2 both use a larger hand-object bbox.
  BBOX_EXPAND_RATIO: 2.0
  STAGE12_USE_HAND_OBJ_BBOX: true
  STAGE12_BBOX_EXPAND_RATIO: 1.5
  STAGE12_HAND_OBJ_SCALE: 1.25
  STAGE2_HAND_OBJ_SCALE: 1.25

MODEL:
  TYPE: POEM_SV_Tri
  PRETRAINED: exp/default_2026_0417_1253_59/checkpoints/checkpoint_20/POEM_SV_Tri.pth.tar
  NUM_OBJ_JOINTS: 21
  CONF_TRI_HAND_TAU_PX: 24.0
  CONF_TRI_REFINE_ITERS: 2
  CONF_OBJ_TRI_TAU_PX: 24.0
  POSE2D_COORD_NORM_FACTOR: 10.0
  OBJ_POSE_GATE_ROT_TAU_DEG: 20.0
  OBJ_POSE_GATE_TRANS_TAU_M: 0.08
  OBJ_POSE_LOSS_ROT_TAU_DEG: 20.0
  OBJ_POSE_LOSS_TRANS_TAU_M: 0.08
  NUM_OBJ_CLASSES: 32
  OBJ_ID_EMBED_DIM: 32
  SHARED_MV_FUSION_ENABLED: true
  SHARED_MV_CANONICAL_FOCAL: 200.0
  SHARED_MV_GEO_RATIO: 0.75
  SHARED_MV_TRANS_SCALE_M: 0.25
  SHARED_MV_MASTER_LOGIT_BOOST: 0.5
  SHARED_MV_RESIDUAL_SCALE: 0.5
  HFL_HAND_ROI_RES: 32
  HFL_HAND_STACKS: 1
  HFL_HAND_BLOCKS: 1
  HFL_HAND_ENCODER_BLOCKS: 4
  HFL_HAND_ENCODER_MODULES: 2
  HFL_MANO_NEURONS: [1024, 512]

  BACKBONE:
    TYPE: ResNet34
    PRETRAINED: true
    FREEZE_BATCHNORM: true

  HEAD:
    TYPE: HOR_Projective_SelfAggregation_Head

    TRANSFORMER:
      TYPE: HORTR
      N_BLOCKS: 3
      INPUT_FEAT_DIM: 256
      NUM_HIDDEN_LAYERS: 4
      NUM_ATTENTION_HEADS: 4
      DROPOUT: 0.1
      N_NEIGHBOR: 32
      N_NEIGHBOR_QUERY: 32
      POINTS_FEAT_DIM: 256
      WITH_POSI_EMBED: true
      PREDICT_INV_SIGMOID: true
      PARAMETRIC_OUTPUT: true
      TRANSFORMER_CENTER_IDX: 9

    POSITIONAL_ENCODING:
      TYPE: SinePositionalEncoding3D
      NUM_FEATS: 128
      NORMALIZE: true

    WITH_POSITION: true
    WITH_MULTIVIEW: true
    NUM_QUERY: 799
    NUM_PREDS: 3
    DEPTH_NUM: 32
    POSITION_RANGE: [-1.2, -1.2, 0.2, 1.2, 1.2, 2.0]
    LID: false
    DEPTH_START: 0.2
    DEPTH_END: 2.0
    POINTS_FEAT_DIM: 256
    EMBED_DIMS: 256
    IN_CHANNELS: 128
    CENTER_SHIFT: true
    N_SAMPLE: 2048
    RADIUS_SAMPLE: 0.1
    OBJ_XYZ_UPDATE_SCALE: 0.05
    CAM_FEAT_MERGE: attn
    QUERY_TYPE: KPT
    STAGE2_HAND_UPDATE_MIN_SCALE: 0.2
    STAGE2_OBJ_FEAT_MIN_SCALE: 0.2
    STAGE2_POSE_DELTA_MIN_SCALE: 0.1
    STAGE2_INIT_ROT_MIN_SCALE: 0.1

  LOSS:
    JOINTS_LOSS_TYPE: l1
    VERTICES_LOSS_TYPE: l1

    HFL_OBJ_REG_N: 1.0
    HFL_OBJ_CONF_N: 1.0
    OBJ_TRI_REPROJ_N: 1.0
    OBJ_POSE_GATE_N: 0.5

    TRIANGULATION_N: 10.0
    TRIANGULATION_HAND_N: 10.0
    TRIANGULATION_OBJ_N: 1.0

    POSE_N: 0.01
    SHAPE_N: 1.0
    MANO_CONSIST_N: 10.0
    MANO_PROJ_N: 50.0

    DECODER_HAND_N: 10.0
    DECODER_PROJ_N: 10.0

    OBJ_POSE_ROT_N: 5.0
    OBJ_POSE_ROT6D_N: 0.1
    OBJ_INIT_ROT_N: 2.0
    OBJ_INIT_ROT6D_N: 0.1
    OBJ_VIEW_ROT_N: 1.0
    OBJ_VIEW_ROT6D_N: 0.05
    OBJ_POSE_TRANS_N: 10.0
    OBJ_POSE_POINTS_N: 10.0
    OBJ_CHAMFER_N: 2.0
    OBJ_EMD_N: 0.2
    OBJ_PENETRATION_N: 2.0

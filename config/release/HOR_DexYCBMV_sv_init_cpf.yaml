TRAIN:
  MANUAL_SEED: 1
  CONV_REPEATABLE: true
  BATCH_SIZE: 8
  EPOCH: 101

  OPTIMIZER: adam
  LR: 0.0001
  WEIGHT_DECAY: 0.0
  SCHEDULER: StepLR
  LR_DECAY_STEP: [70]
  LR_DECAY_GAMMA: 0.1

  LOG_INTERVAL: 25
  VIS_LOG_INTERVAL: 200
  VAL_VIS_LOG_INTERVAL: 100
  VIS_NUM_VIEWS: 8
  VAL_VIS_NUM_VIEWS: 4
  VIS_SELECTION_LOG: false
  FIND_UNUSED_PARAMETERS: false
  DEBUG_LOGS: false
  STATIC_GRAPH: false

  # Stage1-only CPF-style initializer.
  STAGE1_END_EPOCH: 999999
  STAGE2_WARMUP_EPOCHS: 0
  SV_SELF_DISTILL_ENABLED: false
  SV_SELF_DISTILL_START_EPOCH: 999999
  VAL_RECON_FULL_ONLY_FINAL: false

  GRAD_CLIP_ENABLED: true
  GRAD_CLIP:
    TYPE: 2
    NORM: 1.0

DATASET:
  TRAIN:
    TYPE: DexYCBMultiView
    DATA_MODE: 3D
    DATA_ROOT: /media/hl/nvme1TB/datasets
    DATA_SPLIT: train
    SETUP: s0
    N_VIEWS: 8
    USE_LEFT_HAND: false
    FILTER_INVISIBLE_HAND: true
    MAX_HAND_OBJ_SURFACE_DIST_MM: 5.0
    MASTER_SYSTEM: as_constant_camera
    TRANSFORM:
      TYPE: SimpleTransform3DMultiView
      AUG: true
      CENTER_JIT: 0.0
      SCALE_JIT: 0.02
      COLOR_JIT: 0.3
      ROT_JIT: 5
      ROT_PROB: 0.2
      OCCLUSION: true
      OCCLUSION_PROB: 0.1
      MIN_JOINTS_IN_RAW: 3
      MIN_JOINTS_AFTER_CROP: 3

  TEST:
    TYPE: DexYCBMultiView
    DATA_MODE: 3D
    DATA_ROOT: /media/hl/nvme1TB/datasets
    DATA_SPLIT: test
    SETUP: s0
    N_VIEWS: 8
    USE_LEFT_HAND: false
    FILTER_INVISIBLE_HAND: true
    MAX_HAND_OBJ_SURFACE_DIST_MM: 5.0
    TEST_WITH_MULTIVIEW: true
    MASTER_SYSTEM: as_constant_camera
    TRANSFORM:
      TYPE: SimpleTransform3DMultiView
      AUG: false

DATA_PRESET:
  MODE: mv
  USE_CACHE: true

  IMAGE_SIZE: [256, 256]
  CENTER_IDX: 9
  BBOX_3D_SIZE: 0.4
  NUM_JOINTS: 21
  NUM_VERTS: 778

  WITH_HEATMAP: false
  HEATMAP_SIZE: [32, 32]
  HEATMAP_SIGMA: 2.0
  WITH_MASK: false

  BBOX_EXPAND_RATIO: 2.0
  STAGE12_USE_HAND_OBJ_BBOX: true
  STAGE12_BBOX_EXPAND_RATIO: 1.5
  STAGE12_HAND_OBJ_SCALE: 1.25
  STAGE2_HAND_OBJ_SCALE: 1.25

MODEL:
  TYPE: POEM_SV_InitCPF
  PRETRAINED: null
  OBJ_BRANCH_STYLE: geom

  NUM_HAND_JOINTS: 21
  NUM_HAND_VERTS: 778
  NUM_OBJ_JOINTS: 21
  NUM_OBJ_CLASSES: 32
  OBJ_ID_EMBED_DIM: 32
  SHARED_DIM: 128
  INIT_BRANCH_HIDDEN_DIM: 512

  CONF_TRI_HAND_TAU_PX: 24.0
  CONF_TRI_REFINE_ITERS: 2
  CONF_OBJ_TRI_TAU_PX: 24.0

  HAND_TRANS_FACTOR: 100.0
  HAND_SCALE_FACTOR: 0.0001
  OBJ_TRANS_FACTOR: 100.0
  OBJ_SCALE_FACTOR: 0.0001
  POSE_RECOVER_OFF_Z: 0.4

  BACKBONE:
    TYPE: ResNet34
    PRETRAINED: true
    FREEZE_BATCHNORM: true

  LOSS:
    SUPERVISION_MODE: full
    OBJ_DIRECT_POSE_SUPERVISION: false
    OBJ_MASTER_SUPERVISION: false
    JOINTS_LOSS_TYPE: l1
    VERTICES_LOSS_TYPE: l1

    HAND_2D_N: 1.0
    POSE_N: 0.01
    SHAPE_N: 1.0

    OBJ_2D_N: 0.5
    OBJ_POSE_ROT_N: 5.0
    OBJ_POSE_ROT6D_N: 0.1
    OBJ_POSE_TRANS_N: 10.0
    OBJ_KP_REL_3D_N: 5.0
    OBJ_INIT_ROT_N: 2.0
    OBJ_INIT_ROT6D_N: 0.1
    OBJ_INIT_TRANS_N: 10.0
    OBJ_VIEW_ROT_N: 1.0
    OBJ_VIEW_ROT6D_N: 0.05
    OBJ_VIEW_TRANS_N: 10.0
    OBJ_POINTS_3D_N: 2.0
    OBJ_POINTS_REL_3D_N: 4.0
    OBJ_POINTS_2D_N: 0.05

    TRIANGULATION_HAND_N: 10.0
    TRIANGULATION_OBJ_N: 1.0

    DISTILL_HAND_2D_N: 0.0
    DISTILL_OBJ_2D_N: 0.0
    DISTILL_OBJ_ROT_N: 0.0
    DISTILL_OBJ_TRANS_N: 0.0
    DISTILL_TRI_HAND_N: 0.0
    DISTILL_TRI_OBJ_N: 0.0
